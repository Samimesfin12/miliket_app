name: miliket_app
description: Ethiopian Sign Language Learning App - For 3.5 million deaf Ethiopians
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Database
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # Authentication & Storage
  shared_preferences: ^2.2.2

  # Video Player
  youtube_player_flutter: ^9.1.1

  # Camera & ML
  camera: ^0.11.0+2
  google_mlkit_pose_detection: ^0.11.0

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Navigation
  go_router: ^14.2.0

  # Internationalization
  intl: ^0.19.0

  # Utilities
  http: ^1.2.2
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Add assets when you have images:
  # assets:
  #   - assets/images/
  #   - assets/icons/
